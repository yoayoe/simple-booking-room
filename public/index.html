<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Room Booking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="header-left">
      <div class="room-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
        </svg>
      </div>
      <div>
        <h1>Meeting Room</h1>
        <span class="room-label">Ruang Rapat Utama</span>
      </div>
    </div>
    <div class="view-toggle">
      <button id="btn-calendar" class="active" onclick="switchView('calendar')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        Kalender
      </button>
      <button id="btn-list" onclick="switchView('list')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>
        </svg>
        Agenda
      </button>
      <button id="btn-log" onclick="switchView('log')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        Log
      </button>
    </div>
  </header>

  <main>

    <!-- Calendar View -->
    <div id="view-calendar" class="view active">
      <div class="calendar-nav">
        <button class="nav-btn" onclick="changeMonth(-1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
        </button>
        <h2 id="calendar-title"></h2>
        <button class="nav-btn" onclick="changeMonth(1)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M9 18l6-6-6-6"/>
          </svg>
        </button>
      </div>

      <div class="calendar-grid" id="calendar-grid">
        <div class="day-label">Min</div>
        <div class="day-label">Sen</div>
        <div class="day-label">Sel</div>
        <div class="day-label">Rab</div>
        <div class="day-label">Kam</div>
        <div class="day-label">Jum</div>
        <div class="day-label">Sab</div>
      </div>

      <div id="day-detail" class="day-detail hidden">
        <div class="day-detail-header">
          <h3 id="day-detail-title"></h3>
          <button class="close-btn" onclick="closeDayDetail()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div id="day-detail-bookings"></div>
        <button class="btn-add-day" onclick="openModal()">+ Tambah Booking</button>
      </div>
    </div>

    <!-- List / Agenda View -->
    <div id="view-list" class="view">
      <div class="list-header">
        <h2>Agenda Mendatang</h2>
        <div class="filter-row">
          <label>Dari</label>
          <input type="date" id="filter-from" onchange="renderList()" />
          <label>Sampai</label>
          <input type="date" id="filter-to" onchange="renderList()" />
          <button class="btn-reset" onclick="resetFilter()">Reset</button>
        </div>
      </div>
      <div id="booking-list"></div>
    </div>

    <!-- Log View -->
    <div id="view-log" class="view">
      <div class="list-header">
        <h2>Log Aktivitas</h2>
        <button class="btn-reset" onclick="renderLog()">Refresh</button>
      </div>
      <div id="log-list"></div>
    </div>

  </main>

  <button class="fab" onclick="openModal()" title="Tambah Booking">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  </button>

  <!-- Modal Form -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Tambah Booking</h3>
        <button class="close-btn" onclick="closeModal()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <form id="booking-form" onsubmit="submitBooking(event)">
        <input type="hidden" id="edit-id" />

        <div class="form-group">
          <label>Nama Kegiatan <span class="required">*</span></label>
          <input type="text" id="f-title" placeholder="Contoh: Rapat Bulanan" required />
        </div>

        <div class="form-group">
          <label>Dipesan Oleh <span class="required">*</span></label>
          <input type="text" id="f-name" placeholder="Nama Anda" required />
        </div>

        <div class="form-group">
          <label>Email <span class="field-hint">(untuk konfirmasi &amp; reminder)</span></label>
          <input type="email" id="f-email" placeholder="email@contoh.com" />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Tanggal <span class="required">*</span></label>
            <input type="date" id="f-date" required />
          </div>
          <div class="form-group">
            <label>Mulai <span class="required">*</span></label>
            <input type="time" id="f-start" required />
          </div>
          <div class="form-group">
            <label>Selesai <span class="required">*</span></label>
            <input type="time" id="f-end" required />
          </div>
        </div>

        <div class="form-group">
          <label>Catatan</label>
          <textarea id="f-notes" placeholder="Keterangan tambahan (opsional)" rows="2"></textarea>
        </div>

        <div id="form-error" class="form-error hidden"></div>

        <div class="modal-actions">
          <button type="button" class="btn-secondary" onclick="closeModal()">Batal</button>
          <button type="submit" class="btn-primary" id="btn-submit">Simpan</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete -->
  <div id="confirm-overlay" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>Hapus Booking</h3>
      </div>
      <p class="confirm-text">Yakin ingin menghapus booking ini?</p>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeConfirm()">Batal</button>
        <button class="btn-danger" onclick="confirmDelete()">Hapus</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
