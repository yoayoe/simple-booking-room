services:
  db:
    image: postgres:16-alpine
    container_name: booking-room-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: booking_room
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_pass
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_room"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: booking-room-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: booking_room
      DB_USER: booking_user
      DB_PASSWORD: booking_pass
      PORT: 3000
      # Email (SMTP) — isi sesuai provider Anda
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_SECURE: ${EMAIL_SECURE:-false}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # Timezone untuk reminder scheduler
      TZ: Asia/Jakarta
      NODE_TZ: Asia/Jakarta
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
